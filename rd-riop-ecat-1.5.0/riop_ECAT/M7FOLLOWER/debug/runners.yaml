# Available runners configured by board.cmake.
runners:
- jlink
- linkserver

# Default flash runner if --runner is not given.
flash-runner: jlink

# Default debug runner if --runner is not given.
debug-runner: jlink

# Common runner configuration values.
config:
  board_dir: C:/Projects/riop-ecat/mcuxsdk/mcuxsdk/examples/_boards/evkmimxrt1180
  # Build outputs:
  bin_file: riop_ECAT_M7FOLLOWER_cm7.bin
  elf_file: riop_ECAT_M7FOLLOWER_cm7.elf
  hex_file: riop_ECAT_M7FOLLOWER_cm7.hex
  # Host tools:
  gdb: C:/NXP/MCUXpressoIDE_25.6.136/ide/tools/bin/arm-none-eabi-gdb.exe

# Runner specific arguments
args:
  jlink:
    - --dt-flash=y
    - --device=MIMXRT1189xxx8_M7
    - --tool-opt=-jlinkscriptfile jlinkscript/evkmimxrt1180_cm7.jlinkscript
  linkserver:
    - --dt-flash=y
    - --device=MIMXRT1189xxxxx:MIMXRT1180-EVK
    - --core=cm7
